# Publishes this n8n community node package to npm on every version tag push.
#
# Mirrors n8n-io/n8n-nodes-starter's workflow exactly. The only thing that
# made it fail previously was a stale @n8n/node-cli@0.8.0 pinned in the
# lockfile — newer CLI versions (0.23+) configure release-it to skip the
# `npm whoami` pre-check that's incompatible with OIDC publishing.
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# Option A — OIDC Trusted Publishing (recommended, no long-lived secrets):
#   1. On npmjs.com open the package's settings → "Trusted Publishers".
#   2. Add a GitHub Actions publisher with:
#        Repository owner: ahnv
#        Repository name:  n8n-nodes-imagekit
#        Workflow name:    publish.yml
#        Environment:      (leave blank)
#   3. Leave NPM_TOKEN unset — the OIDC token negotiated via the
#      `id-token: write` permission below is used instead.
#
# Option B — npm Automation Token (fallback):
#   Create a Granular Access Token scoped to this package and add it as the
#   NPM_TOKEN repo secret. The conditional below writes it to .npmrc.
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
#   npm run release   # locally — bumps version, tags, pushes
#
# The tag push triggers this workflow which runs lint + build + publish.

name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
